<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Yolannis 🌻</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #fff7c2 0%, #ffe680 45%, #f4c542 100%);
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .flower-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 420px;
      animation: rise 1.2s ease-out forwards;
    }

    .stem {
      position: absolute;
      bottom: 0;
      width: 16px;
      height: 0;
      background: linear-gradient(to top, #2f8f2f, #49b749);
      border-radius: 20px;
      animation: growStem 1s ease-out forwards;
      animation-delay: 0.2s;
    }

    .leaf {
      position: absolute;
      width: 70px;
      height: 35px;
      background: #3fae3f;
      border-radius: 70px 0 70px 0;
      opacity: 0;
      animation: showLeaf 0.5s ease-out forwards;
    }

    .leaf.left {
      bottom: 120px;
      right: 50%;
      transform: rotate(-35deg);
      animation-delay: 0.9s;
    }

    .leaf.right {
      bottom: 180px;
      left: 50%;
      transform: rotate(145deg);
      animation-delay: 1.1s;
    }

    .flower {
      position: absolute;
      bottom: 260px;
      width: 40px;
      height: 40px;
      transform: scale(0);
      animation: bloom 1.1s ease-out forwards;
      animation-delay: 1s;
    }

    .petal {
      position: absolute;
      width: 72px;
      height: 72px;
      background: #ffd84d;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      margin-left: -36px;
      margin-top: -36px;
      box-shadow: inset -6px -6px 0 rgba(255, 193, 7, 0.35);
    }

    .p1 { transform: translate(0, -52px); }
    .p2 { transform: translate(37px, -37px); }
    .p3 { transform: translate(52px, 0); }
    .p4 { transform: translate(37px, 37px); }
    .p5 { transform: translate(0, 52px); }
    .p6 { transform: translate(-37px, 37px); }
    .p7 { transform: translate(-52px, 0); }
    .p8 { transform: translate(-37px, -37px); }

    .center {
      position: absolute;
      width: 72px;
      height: 72px;
      background: #6b3e12;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset 0 0 0 8px rgba(95, 55, 15, 0.18);
      z-index: 2;
    }

    .message {
      opacity: 0;
      transform: translateY(25px);
      animation: showText 1s ease forwards;
      animation-delay: 2.2s;
      text-align: center;
      width: 90%;
      max-width: 500px;
      background: rgba(255,255,255,0.78);
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h1 {
      color: #8a5a00;
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      color: #5c4300;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .firma {
      font-weight: bold;
      margin-top: 10px;
    }

    @keyframes growStem {
      from { height: 0; }
      to { height: 260px; }
    }

    @keyframes bloom {
      0% { transform: scale(0); }
      70% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @keyframes showLeaf {
      from { opacity: 0; transform: scale(0.4) rotate(0deg); }
      to { opacity: 1; }
    }

    @keyframes showText {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rise {
      from { transform: translateY(30px); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="flower-wrap">
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>

      <div class="flower">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
        <div class="petal p6"></div>
        <div class="petal p7"></div>
        <div class="petal p8"></div>
        <div class="center"></div>
      </div>
    </div>

    <div class="message">
      <h1>Para Yolannis 🌻</h1>
      <p>
        Quise regalarte esta flor amarilla para que te recuerde
        lo especial que eres para mí.
      </p>
      <p>
        Así como esta flor nació y creció, así de bonito crece
        todo lo que siento por ti.
      </p>
      <p class="firma">Con cariño, Yohan 💛</p>
    </div>
  </div>
</body>
</html>
